<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sotto - 招待</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans JP', -apple-system, sans-serif;
    background: linear-gradient(180deg, #F5F2EC 0%, #EDE8DF 50%, #E8E2D8 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: rgba(255, 252, 245, 0.75);
    border: 1px solid rgba(160, 140, 110, 0.12);
    border-radius: 20px;
    padding: 48px 36px;
    max-width: 380px;
    width: 100%;
    text-align: center;
    box-shadow: 0 4px 12px rgba(120, 100, 70, 0.08);
  }
  .icon {
    width: 64px; height: 64px;
    background: #7BA05B;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
    font-size: 28px; font-weight: 700; color: #fff;
    box-shadow: 0 8px 24px rgba(123, 160, 91, 0.25);
  }
  h1 { font-size: 22px; font-weight: 700; color: #2D2A24; margin-bottom: 12px; }
  p { font-size: 15px; color: #6B6356; line-height: 1.6; margin-bottom: 24px; }
  .btn {
    display: inline-block;
    background: #7BA05B;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px 40px;
    font-size: 16px;
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(123, 160, 91, 0.3);
  }
  .btn:hover { opacity: 0.9; }
  .sub { font-size: 13px; color: #9B9284; margin-top: 20px; }
  .sub a { color: #7BA05B; text-decoration: none; }
  .status { font-size: 14px; color: #9B9284; margin-top: 16px; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">S</div>
  <h1>Sottoに招待されています</h1>
  <p>スペースに参加して、気づきを共有しましょう。</p>
  <a id="openBtn" class="btn" href="#">アプリで開く</a>
  <div id="status" class="status"></div>
  <p class="sub">
    アプリをお持ちでない方は<br>
    <a href="https://apps.apple.com/app/id6760157446">App Storeからダウンロード</a>
  </p>
</div>

<script>
  // Extract token from URL: /invite/{token} or /invite/?t={token}
  const path = window.location.pathname;
  const params = new URLSearchParams(window.location.search);
  
  // Try path-based token first: /invite/abc123
  let token = null;
  const pathMatch = path.match(/\/invite\/([a-f0-9]+)\/?$/i);
  if (pathMatch) {
    token = pathMatch[1];
  } else {
    // Fallback to query param: /invite/?t=abc123
    token = params.get('t');
  }

  const btn = document.getElementById('openBtn');
  const status = document.getElementById('status');

  if (token) {
    const appUrl = 'sotto://invite/' + token;
    btn.href = appUrl;
    
    // Auto-try to open app
    setTimeout(function() {
      window.location.href = appUrl;
    }, 300);
    
    btn.addEventListener('click', function(e) {
      e.preventDefault();
      window.location.href = appUrl;
      // If app doesn't open after 2s, show message
      setTimeout(function() {
        status.textContent = 'アプリが開かない場合は、App Storeからインストールしてください。';
      }, 2000);
    });
  } else {
    btn.style.display = 'none';
    status.textContent = '無効な招待リンクです。';
  }
</script>
</body>
</html>
